name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular application
        run: npm run build -- --base-href=/demonology-archive/

      - name: Find build directory
        shell: bash
        run: |
          if [ -f "dist/demonology-archive/browser/index.html" ]; then
            echo "BUILD_DIR=dist/demonology-archive/browser" >> "$GITHUB_ENV"
          elif [ -f "dist/demonology-archive/index.html" ]; then
            echo "BUILD_DIR=dist/demonology-archive" >> "$GITHUB_ENV"
          else
            echo "Angular index.html not found"
            find dist -maxdepth 4 -type f | sort
            exit 1
          fi

      - name: Prepare Angular routes
        shell: bash
        run: |
          cp "$BUILD_DIR/index.html" "$BUILD_DIR/404.html"
          touch "$BUILD_DIR/.nojekyll"

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.BUILD_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4