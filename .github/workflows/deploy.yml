name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build -- --base-href=/demonology-archive/

      - name: Show build files
        run: |
          echo "DIST CONTENT:"
          find dist -maxdepth 4 -type f | sort

      - name: Prepare Pages directory
        run: |
          mkdir -p pages-output

          if [ -f "dist/demonology-archive/browser/index.html" ]; then
            cp -r dist/demonology-archive/browser/. pages-output/
          elif [ -f "dist/demonology-archive/index.html" ]; then
            cp -r dist/demonology-archive/. pages-output/
          else
            echo "index.html was not found"
            exit 1
          fi

          cp pages-output/index.html pages-output/404.html
          touch pages-output/.nojekyll

          echo "PAGES OUTPUT:"
          ls -la pages-output

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
